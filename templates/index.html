<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Management System</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 font-sans">

    <div class="max-w-5xl mx-auto mt-10 p-6">
        <div class="flex items-center justify-center mb-8">
            <span class="text-4xl mr-3">🎓</span>
            <h1 class="text-4xl font-semibold text-gray-800">Student Management System</h1>
        </div>

        <form action="/add" method="POST" class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-4">
            <input type="text" name="name" placeholder="Name" required
                class="border border-gray-300 rounded-md px-4 py-2 focus:outline-none focus:ring-2 focus:ring-green-500">
            
            <input type="number" name="age" placeholder="Age" required
                class="border border-gray-300 rounded-md px-4 py-2 focus:outline-none focus:ring-2 focus:ring-green-500">
            
            <input type="text" name="grade" placeholder="Grade (e.g. A, B+)" required
                class="border border-gray-300 rounded-md px-4 py-2 focus:outline-none focus:ring-2 focus:ring-green-500">
            
            <button type="submit" class="md:col-span-3 bg-[#1e7e4e] hover:bg-[#165e3a] text-white font-medium py-2 rounded-md transition duration-200">
                Add Student
            </button>
        </form>

        <div class="overflow-hidden rounded-lg border border-gray-200 shadow-sm">
            <table class="min-w-full bg-white text-left border-collapse">
                <thead class="bg-[#1a1a1a] text-white">
                    <tr>
                        <th class="px-6 py-3 font-bold uppercase text-sm">ID</th>
                        <th class="px-6 py-3 font-bold uppercase text-sm">Name</th>
                        <th class="px-6 py-3 font-bold uppercase text-sm">Age</th>
                        <th class="px-6 py-3 font-bold uppercase text-sm">Grade</th>
                        <th class="px-6 py-3 font-bold uppercase text-sm">Actions</th>
                    </tr>
                </thead>
                <tbody class="divide-y divide-gray-200">
                    {% for s in student %}
                    <tr class="hover:bg-gray-50">
                        <td class="px-6 py-4 text-gray-700">{{ s[0] }}</td>
                        <td class="px-6 py-4 text-gray-700">{{ s[1] }}</td>
                        <td class="px-6 py-4 text-gray-700">{{ s[2] }}</td>
                        <td class="px-6 py-4">
                            <span class="bg-blue-100 text-blue-700 px-2 py-1 rounded text-sm font-semibold">
                                {{ s[3] }}
                            </span>
                        </td>
                        <td class="px-6 py-4">
                            <a href="/delete/{{ s[0] }}" 
                               class="bg-[#d9534f] hover:bg-[#c9302c] text-white px-4 py-1 rounded text-sm transition shadow-sm">
                               Delete
                            </a>
                        </td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    </div>

</body>
</html>
